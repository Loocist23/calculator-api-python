version: '3.8'

services:
  calculator-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculator-api-python
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:3000/calculate?operation=add&a=1&b=2', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: calculator-api-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - calculator-api
    profiles:
      - production
    restart: unless-stopped
